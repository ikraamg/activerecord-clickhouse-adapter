plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    # Byte-exact vendored Rails test files (see spec/rails_compat/vendor/UPSTREAM).
    - spec/rails_compat/vendor/**/*

Style/Documentation:
  Enabled: false

# Match the Rails codebase this gem plugs into.
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - spec/**/*

# The signatures/names below are dictated by the ActiveRecord adapter contract
# (AbstractAdapter hooks) — they must match Rails, not our style preferences.
Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/MethodLength:
  AllowedMethods: [initialize]
  # Flat mapping tables (type families, system.columns fields → Column); harness
  # support mirrors upstream Rails test-helper semantics verbatim.
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/schema_statements.rb
    - spec/rails_compat/support/**/*

Metrics/ClassLength:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/type_parser.rb
    # One flat decoder per type family, mirroring types.rb's caster table.
    - lib/active_record/connection_adapters/clickhouse/row_binary.rb
    # Carries its RawResult and ChunkedBody value objects as nested classes.
    - lib/active_record/connection_adapters/clickhouse/http_connection.rb
    # One flat dump hook per schema object kind (columns, MVs, projections).
    - lib/active_record/connection_adapters/clickhouse/schema_dumper.rb

Metrics/AbcSize:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/types.rb
    - lib/active_record/connection_adapters/clickhouse/schema_definitions.rb
    - spec/rails_compat/support/**/*

# Flat type-mapping tables and the breadth of the AR schema contract.
Metrics/CyclomaticComplexity:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/schema_statements.rb
    - spec/rails_compat/support/**/*

Metrics/PerceivedComplexity:
  Exclude:
    - spec/rails_compat/support/**/*

Metrics/ModuleLength:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/schema_statements.rb
    - lib/active_record/connection_adapters/clickhouse/database_statements.rb
    # The hand-translated schema slice is one flat DDL table per vendored suite.
    - spec/rails_compat/support/schema_slice.rb

# visit_* names and the `o` parameter are Rails' visitor contracts (SchemaCreation, Arel).
Naming/MethodName:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/schema_definitions.rb
    - lib/arel/visitors/clickhouse.rb

# pk is Rails' own parameter name in the DatabaseStatements#insert contract.
Naming/MethodParameterName:
  AllowedNames: [o, as, at, by, db, id, in, io, ip, of, on, os, pk, pp, to]

Naming/AccessorMethodName:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse_adapter.rb

Naming/PredicateMethod:
  AllowedMethods:
    - default_prepared_statements
    - consume
    - peek
    - cast
    - unquoted_true
    - unquoted_false

# Integration specs describe live behaviors (connection, migration flows), not one class.
RSpec/DescribeClass:
  Enabled: false

# Specs live under spec/clickhouse/ to match the gem's domain layout, not AR's full path.
RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/ExampleLength:
  Max: 15

RSpec/MultipleExpectations:
  Max: 3

# No transactional fixtures here; before(:all) builds shared read-only DDL fixtures.
RSpec/BeforeAfterAll:
  Enabled: false

Gemspec/DevelopmentDependencies:
  EnforcedStyle: Gemfile

Naming/FileName:
  Exclude:
    - lib/activerecord-clickhouse-adapter.rb
