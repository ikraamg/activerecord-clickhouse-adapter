plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

# Match the Rails codebase this gem plugs into.
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - spec/**/*

# The signatures/names below are dictated by the ActiveRecord adapter contract
# (AbstractAdapter hooks) — they must match Rails, not our style preferences.
Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/MethodLength:
  AllowedMethods: [initialize]

Metrics/ClassLength:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/type_parser.rb

Metrics/AbcSize:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse/types.rb

Naming/AccessorMethodName:
  Exclude:
    - lib/active_record/connection_adapters/clickhouse_adapter.rb

Naming/PredicateMethod:
  AllowedMethods:
    - default_prepared_statements
    - consume
    - peek
    - cast

# Integration specs describe live behaviors (connection, migration flows), not one class.
RSpec/DescribeClass:
  Enabled: false

# Specs live under spec/clickhouse/ to match the gem's domain layout, not AR's full path.
RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/ExampleLength:
  Max: 10

RSpec/MultipleExpectations:
  Max: 3

Gemspec/DevelopmentDependencies:
  EnforcedStyle: Gemfile

Naming/FileName:
  Exclude:
    - lib/activerecord-clickhouse-adapter.rb
