name: CI

on:
  push:
    branches: [main]
  pull_request:

# The suite runs against a real ClickHouse server only (no mocked wire responses),
# so every job boots the compose file before rspec.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    name: "Ruby ${{ matrix.ruby }} / AR ${{ matrix.rails }} / ClickHouse ${{ matrix.clickhouse }}"
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.4", "4.0"]
        rails: [release]
        clickhouse: ["25.8"]
        include:
          - { ruby: "3.4", rails: release, clickhouse: latest }
          - { ruby: "3.4", rails: edge, clickhouse: "25.8" }
    env:
      CLICKHOUSE_VERSION: ${{ matrix.clickhouse }}
      RAILS_SOURCE: ${{ matrix.rails == 'edge' && 'edge' || '' }}
      # The committed lock is resolved on the newest Ruby; older Rubies and the
      # edge-Rails job re-resolve as needed.
      BUNDLE_FROZEN: "false"
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --wait
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cache-version: rails-${{ matrix.rails }}
      - run: bundle exec rspec
      - name: Server log tail on failure
        if: failure()
        run: docker compose logs --tail 50 clickhouse
