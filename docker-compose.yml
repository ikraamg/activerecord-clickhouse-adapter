# Real ClickHouse server for the adapter's spec suite and benchmarks.
#   Up:   docker compose up -d --wait
#   Down: docker compose down
# 25.8 = the LTS the TRMNL prod telemetry sink pins; matrix jobs add :latest later.
# Data lives on tmpfs: every `down` is a factory reset, and MergeTree merges are RAM-fast.
# Host ports are offset (18123/19000) so the core repo's spike (8123) and sandbox (8124+) never collide.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: activerecord-clickhouse-test
    environment:
      CLICKHOUSE_DB: ar_clickhouse_test
      CLICKHOUSE_USER: rails
      CLICKHOUSE_PASSWORD: rails
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-19000}:9000"
    tmpfs:
      - /var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "rails", "--password", "rails", "--query", "SELECT 1"]
      interval: 2s
      timeout: 3s
      retries: 30
