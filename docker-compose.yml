# Real ClickHouse server for the adapter's spec suite and benchmarks.
#   Up:   docker compose up -d --wait
#   Down: docker compose down
# 25.8 = the LTS the TRMNL prod telemetry sink pins; matrix jobs add :latest later.
# Data lives on tmpfs: every `down` is a factory reset, and MergeTree merges are RAM-fast.
# Host ports are offset (18123/19000) so the core repo's spike (8123) and sandbox (8124+) never collide.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-25.8} # CI matrix overrides; 25.8 = LTS default
    container_name: activerecord-clickhouse-test
    environment:
      CLICKHOUSE_DB: ar_clickhouse_test
      CLICKHOUSE_USER: rails
      CLICKHOUSE_PASSWORD: rails
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-19000}:9000"
      - "${CLICKHOUSE_HTTPS_PORT:-18443}:8443" # self-signed TLS, for the ssl/ssl_verify specs
    tmpfs:
      - /var/lib/clickhouse
    volumes:
      - ./spec/support/tls/https.xml:/etc/clickhouse-server/config.d/https.xml:ro
      - ./spec/support/tls/server.crt:/etc/clickhouse-server/certs/server.crt:ro
      - ./spec/support/tls/server.key:/etc/clickhouse-server/certs/server.key:ro
      - ./spec/support/cluster/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro # ON CLUSTER DDL needs coordination
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "rails", "--password", "rails", "--query", "SELECT 1"]
      interval: 2s
      timeout: 3s
      retries: 30
