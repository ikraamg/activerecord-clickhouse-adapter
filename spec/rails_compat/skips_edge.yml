# Extra skips applied only when RAILS_SOURCE=edge runs the vendored 8.1.3 suites
# against Rails main: upstream drift in the pinned test text, not adapter behavior.
# Each entry names the upstream change; delete it when the vendored corpus is re-pinned.
HasManyAssociationsTest:
  test_invalid_key_raises_with_message_including_all_default_options: >-
    Rails main added :default_order to the valid has_many keys, changing the
    asserted error message (pinned 8.1.3 text)
ActiveRecord::ConnectionAdapters::QuotingTest:
  test_quote_as_mb_chars_no_column: >-
    Rails main removed ActiveSupport::Multibyte::Chars, which the pinned test constructs
ActiveRecord::Migration::ColumnsTest:
  test_change_column: &fetch_cast_type_removed >-
    Rails main removed Column#fetch_cast_type (now cast_type), which the pinned test calls
ActiveRecord::Migration::ChangeSchemaTest:
  test_create_table_with_defaults: *fetch_cast_type_removed
MigrationTest:
  test_method_missing_delegates_to_connection: &migration_strategy_added >-
    Rails main's Migration#execution_strategy asks the pool for migration_strategy,
    which the pinned test's hand-rolled connection stub doesn't define
  test_respond_to_for_migration_method: *migration_strategy_added
EnumTest:
  test_assign_non_existing_value_raises_an_error: >-
    Rails main appends the list of valid values to the enum ArgumentError message
    (pinned 8.1.3 text asserts the shorter message)
AttributeMethodsTest:
  "*": >-
    Rails main froze attribute_method_patterns (ractor safety); the pinned suite's
    teardown mutates it in place with clear/concat, erroring every test in the class
ActiveRecord::BindParameterTest:
  test_binds_with_filtered_attributes: &event_object_payload >-
    Rails main's LogSubscriber#sql receives an ActiveSupport Event object (no #[]);
    the pinned tests drive it with a hash payload
  test_logs_unnamed_binds: *event_object_payload
  test_logs_binds_after_type_cast: *event_object_payload
