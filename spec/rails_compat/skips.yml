  # identifiers and the server answers SYNTAX_ERROR regardless of encoding.
  test_invalid_encoding_query: >-
    upstream's probe aliases with a quoted string (AS 'x'), which ClickHouse
    rejects as a syntax error regardless of the encoding under test

# Upstream ships per-adapter Marshal dumps recorded on Rails 6.1/7.1
# (Mysql2/PostgreSQL/SQLite/Trilogy); no honest ClickHouse dump can exist —
# this adapter never ran on those versions and dumps embed adapter types.
MarshalSerializationTest:
  test_deserializing_rails_6_1_marshal_basic: &no_historic_marshal_dumps >-
    upstream's fixture dumps were recorded per-adapter on Rails 6.1/7.1; this
    adapter has no honest historical dump to replay
  test_deserializing_rails_6_1_marshal_with_loaded_association_cache: *no_historic_marshal_dumps
  test_deserializing_rails_7_1_marshal_basic: *no_historic_marshal_dumps
  test_deserializing_rails_7_1_marshal_with_loaded_association_cache: *no_historic_marshal_dumps

# log_subscriber corpus (Iteration 43). Rails redacts logged binds whose cast
# type answers binary?; ClickHouse has one byte-safe String type, so there is
# no binary type to trigger the "<N bytes of binary data>" placeholder.
LogSubscriberTest:
  test_binary_data_is_not_logged: &no_binary_cast_type >-
    one byte-safe String type — no binary cast type exists to trigger Rails'
    binary-bind log redaction
  test_binary_data_hash: *no_binary_cast_type

# structured_event_subscriber corpus (Iteration 44): same redaction seam.
ActiveRecord::StructuredEventSubscriberTest:
  test_binary_data_is_not_logged: *no_binary_cast_type
  test_binary_data_hash: *no_binary_cast_type

# fixtures corpus (Iteration 44). Fixture loading, ERB rendering, custom paths,
# and accessors all pass; the skips are the familiar dialect seams.
FixturesTest:
  test_binary_in_fixtures: >-
    the JPEG's bytes round-trip exactly, but with one String type the read
    comes back UTF-8 tagged, not ASCII-8BIT — no binary cast type exists to
    force-encode it
  test_inserts_with_pre_and_suffix: *no_time_ddl
# The class opts into use_transactional_tests: fixtures insert once and each
# test's writes roll back. With honest no-op transactions test_destroy's delete
# leaks, and the sibling test then dies in before_setup instantiating @first —
# ahead of any per-test skip hook.
TransactionalFixturesTest:
  "*": &fixture_rollback >-
    transactional fixtures undo writes by rolling back; ClickHouse
    transactions are honest no-ops, so the destroy is real (decision #15:
    truncate + reload instead)
TransactionalFixturesOnCustomConnectionTest:
  test_leaky_destroy: *fixture_rollback

# locking corpus (Iteration 43). Optimistic locking passes end-to-end (stale
# writes match zero rows via the lock_version predicate and raise
# StaleObjectError); FOR UPDATE drops from SQL like the sqlite3 adapter, so
# pessimistic tests reduce to plain reads.
OptimisticLockingTest:
  test_lock_without_default_queries_count: *query_count_tally
  test_lock_with_custom_column_without_default_queries_count: *query_count_tally
  test_update_with_dirty_primary_key: *key_column_update

PessimisticLockingTest:
  test_with_lock_rolls_back_transaction: *autosave_rollback

# associations umbrella corpus (Iteration 43).
AssociationsTest:
  test_loading_cpk_association_when_persisted_and_in_memory_differ: *composite_prefetch

PreloaderTest:
  test_preload_wont_set_the_wrong_target: *key_column_update
