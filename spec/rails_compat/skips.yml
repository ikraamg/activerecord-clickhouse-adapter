# Skip manifest for the vendored Rails Active Record suites.
# Every entry needs a one-line reason; this file may only shrink (ratchet).
# Format: { "TestClassName" => { "test_method_name" => "reason" } }
CalculationsTest:
  # ClickHouse has no functional-dependency GROUP BY: grouping by the primary key does
  # not license selecting other ungrouped columns (NOT_AN_AGGREGATE, code 215).
  test_should_count_with_group_by_qualified_name_on_loaded: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_having_with_strong_parameters: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_select_avg_with_joins_and_group_by_as_virtual_attribute_with_ar: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_select_avg_with_joins_and_group_by_as_virtual_attribute_with_sql: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_ids_with_includes_and_non_primary_key_order: >-
    ORDER BY on a column outside GROUP BY needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)

  # ClickHouse cannot resolve unaliased base-table columns in a self-join ON clause
  # (AMBIGUOUS_IDENTIFIER, code 207) for Rails' `FROM topics JOIN topics AS replies_topics`.
  test_pluck_with_qualified_name_on_loaded: >-
    self-join with unaliased base table raises AMBIGUOUS_IDENTIFIER

FinderTest:
  test_include_on_unloaded_relation_with_having_referencing_aliased_select: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_joins_dont_clobber_id: >-
    self-join with unaliased base table raises AMBIGUOUS_IDENTIFIER

PersistenceTest:
  # ClickHouse has no autoincrement: nothing populates an id column the client did
  # not send, and Column#auto_populated? is only true for DEFAULT expressions.
  test_populates_non_primary_key_autoincremented_column: >-
    no autoincrement — an unsent id column stays at its type default
  test_populates_autoincremented_id_pk_regardless_of_its_position_in_columns_list: >-
    no autoincrement — the table cannot have two auto-populated columns
  test_populates_non_primary_key_autoincremented_column_for_a_cpk_model: >-
    Rails' prefetch seam cannot populate one column of a composite primary key
  # Sorting-key columns are immutable in ClickHouse (CANNOT_UPDATE_COLUMN, code 420).
  test_update: >-
    changing a record's id means mutating the sorting-key column (CANNOT_UPDATE_COLUMN)
  test_update_columns_changing_id: >-
    changing a record's id means mutating the sorting-key column (CANNOT_UPDATE_COLUMN)
  test_update_all_with_custom_sql_as_value: >-
    correlated subquery in a mutation SET raises UNKNOWN_IDENTIFIER (no correlated subqueries)

RelationTest:
  # ClickHouse has no functional-dependency GROUP BY (same family as CalculationsTest).
  test_multiple_where_and_having_clauses: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_having_with_binds_for_both_where_and_having: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)

  # ClickHouse has no unique constraints: create_or_find_by's INSERT never raises
  # RecordNotUnique, so the conflict-recovery paths these tests exercise cannot fire.
  test_find_or_create_by_race_condition: >-
    no unique constraints — the losing INSERT succeeds instead of raising RecordNotUnique
  test_create_or_find_by_with_non_unique_attributes: >-
    no unique constraints — the second INSERT succeeds instead of raising RecordNotUnique
  test_create_or_find_by_with_bang_with_non_unique_attributes: >-
    no unique constraints — the second INSERT succeeds instead of raising RecordNotUnique
  test_create_or_find_by_rollbacks_a_transaction: >-
    needs a real transaction rollback; ClickHouse transactions are honest no-ops
  test_create_or_find_by_bang_rollbacks_a_transaction: >-
    needs a real transaction rollback; ClickHouse transactions are honest no-ops

  # A column named like its own table breaks every qualified star — `comments.*`
  # resolves to the Int32 column, not the table (UNSUPPORTED_METHOD, probed 2026-07-13)
  # — so the slice cannot carry the upstream comments.comments column.
  test_unscope_with_unknown_column: >-
    needs a comments.comments column, which would break SELECT comments.* server-side

  # A FROM alias that equals a real table name shadows that table in later JOINs:
  # `FROM posts AS categories_posts JOIN categories_posts` joins the aliased posts
  # table again (UNKNOWN_IDENTIFIER, probed 2026-07-13).
  test_alias_tracker_respects_a_custom_table: >-
    FROM alias shadowing a real table name breaks JOIN resolution (UNKNOWN_IDENTIFIER)

  # Same seam as PersistenceTest: Rails' prefetch path asks for one generated value
  # even when the model's composite primary key is already fully assigned.
  test_find_or_initialize_by_with_cpk_association: >-
    Rails' prefetch seam cannot populate one column of a composite primary key

BelongsToAssociationsTest:
  # assert_queries_count counts BEGIN/COMMIT on transactional adapters; this adapter
  # emits no transaction SQL and adds one count-first SELECT per mutation (decision #26),
  # so touch/counter-cache query tallies never line up with upstream's expectations.
  test_belongs_to_with_touch_option_on_touch: &query_count_tally >-
    query-count tally assumes BEGIN/COMMIT plus single-statement writes; the adapter
    emits no transaction SQL and one count-first SELECT per mutation
  test_belongs_to_with_touch_option_on_touch_and_removed_parent: *query_count_tally
  test_belongs_to_with_touch_option_on_destroy_with_destroyed_parent: *query_count_tally
  test_belongs_to_with_touch_on_multiple_records: *query_count_tally
  test_belongs_to_touch_with_reassigning: *query_count_tally
  test_belongs_to_counter_after_save: *query_count_tally
  test_dont_find_target_when_saving_foreign_key_after_stale_association_loaded: *query_count_tally
  test_runs_parent_presence_check_if_parent_changed_or_nil: *query_count_tally
  test_skips_parent_presence_check_if_parent_has_not_changed: *query_count_tally

  # The adapter deliberately reports no primary key from the server (ledger #7): a
  # ClickHouse PRIMARY KEY is an index prefix, not a uniqueness guarantee. The harness
  # assigns model-level primary keys at load, but models defined inside a test body
  # never get one, so Rails builds `WHERE `` IS NULL` or refuses default orders.
  test_default: &anonymous_model_primary_key >-
    in-test anonymous model needs a server-reported primary key; the adapter
    deliberately reports none (ledger #7)
  test_runs_parent_presence_check_if_parent_has_not_changed_and_belongs_to_required_validates_foreign_key_is_set: *anonymous_model_primary_key
  test_default_scope_on_relations_is_not_cached: *anonymous_model_primary_key
  test_polymorphic_stale_state_handles_nil_foreign_keys_correctly: *anonymous_model_primary_key

  # Same seam as PersistenceTest/RelationTest: Rails' prefetch path asks the adapter
  # for one generated value although the composite/query-constrained key is assigned.
  test_belongs_to_with_explicit_composite_primary_key: &composite_prefetch >-
    Rails' prefetch seam cannot populate one column of a composite primary key
  test_building_the_belonging_object_for_composite_primary_key: *composite_prefetch
  test_should_set_composite_foreign_key_on_association_when_key_changes_on_associated_record: *composite_prefetch
  test_association_with_query_constraints_assigns_id_on_replacement: *composite_prefetch
  test_belongs_to_with_inverse_association_for_composite_primary_key: *composite_prefetch

  # before_destroy halting relies on rolling the already-deleted children back.
  test_dependency_should_halt_parent_destruction: &destroy_halt_rollback >-
    halting destroy needs a real transaction rollback; ClickHouse transactions are honest no-ops
  test_dependency_should_halt_parent_destruction_with_cascaded_three_levels: *destroy_halt_rollback

  test_belongs_to_with_primary_key_joins_on_correct_column: >-
    assertion allowlists backtick quoting to Mysql2/Trilogy; ClickHouse quotes with
    backticks but is not in the branch
  test_raises_type_mismatch_with_namespaced_class: >-
    inline create_table without order:; the adapter requires an explicit sorting key

HasManyAssociationsTest:
  # Same families as BelongsToAssociationsTest: query tallies assume transaction SQL
  # and single-statement writes; the adapter emits neither.
  test_inverse_on_before_validate: *query_count_tally
  test_create_without_loading_association: *query_count_tally
  "test_delete_all,_when_not_loaded,_doesn't_load_the_records": *query_count_tally
  test_counter_cache_updates_in_memory_after_update_with_inverse_of_disabled: *query_count_tally
  test_counter_cache_updates_in_memory_after_update_with_inverse_of_enabled: *query_count_tally

  # Collection replace/destroy relies on rolling back the writes a failed replace
  # already made; ClickHouse transactions are honest no-ops.
  test_transactions_when_replacing_on_persisted: &collection_rollback >-
    restoring the collection needs a real transaction rollback; ClickHouse transactions
    are honest no-ops
  test_transaction_when_deleting_persisted: *collection_rollback
  test_dependence_with_transaction_support_on_failure: *collection_rollback
  test_create_children_could_be_rolled_back_by_after_save: *collection_rollback

  test_in_memory_replacements_do_not_execute_callbacks: *anonymous_model_primary_key
  test_default_scope_on_relations_is_not_cached: *anonymous_model_primary_key
  test_anonymous_has_many: *anonymous_model_primary_key

  # ClickHouse mutations resolve WHERE against an internal projection where
  # table-qualified names raise UNKNOWN_IDENTIFIER, so the adapter compiles DELETEs
  # with bare column names (decision #26); the assertion demands qualified ones.
  test_sharded_deleting_models: >-
    assertion expects table-qualified DELETE columns; ClickHouse mutations require bare names

  # Two single-row inserts land in two parts, and an unordered SELECT returns parts
  # in scan order, not insertion order.
  test_replace_returns_target: >-
    unordered association read; ClickHouse part-scan order is not insertion order

DeprecatedBelongsToAssociationsTest:
  # The test bypasses the ORM with raw `UPDATE cars SET name = '…'`; ClickHouse's
  # lightweight UPDATE statement requires a WHERE clause (SYNTAX_ERROR).
  test_reload_<association>: &raw_update_without_where >-
    raw UPDATE without WHERE; ClickHouse lightweight UPDATE requires a WHERE clause
  test_reset_<association>: *raw_update_without_where

InsertAllTest:
  # These exercise semantics ClickHouse does not have: unique constraints and
  # ON CONFLICT update handling. insert_all's duplicate-skip is vacuously satisfied
  # (nothing can conflict, so duplicates insert instead of being skipped);
  # upsert_all still raises honestly.
  test_insert_all_raises_on_duplicate_records: &no_unique_constraints >-
    no unique constraints — duplicate rows insert cleanly instead of being skipped
  test_insert_all_can_skip_duplicate_records: *no_unique_constraints
  test_skip_duplicates_strategy_does_not_secretly_upsert: *no_unique_constraints
  test_insert_all_with_skip_duplicates_and_autonumber_id_given: *no_unique_constraints
  test_insert_all_with_skip_duplicates_and_autonumber_id_not_given: *no_unique_constraints
  test_insert: &no_upsert >-
    upsert needs conflict semantics, which the adapter honestly rejects
  test_insert_all_and_upsert_all_works_with_composite_primary_keys_when_unique_by_is_not_provided: *no_upsert
  test_upsert_all_implicitly_sets_primary_keys_when_nil: >-
    upsert_all needs conflict semantics, which the adapter honestly rejects
  # Passed before Iteration 23 only via silent NULL->0 coercion, which
  # input_format_null_as_default = 0 now turns into an honest NotNullViolation.
  test_insert_all_implicitly_sets_primary_keys_when_nil: >-
    no autoincrement — the server cannot populate an explicit NULL id, it raises

BasicsTest:
  # The adapter deliberately reports no primary key from the server (ledger #7); the
  # harness assigns model-level pks at load, which cannot reach models defined inside
  # a test body or models whose only_columns excludes id.
  test_dup_with_aggregate_of_same_name_as_attribute: *anonymous_model_primary_key
  test_marshal_between_processes: *anonymous_model_primary_key
  test_permitted_columns_have_attribute_methods: >-
    only_columns hides id, so the harness cannot assign a model-level primary key and
    the adapter deliberately reports none (ledger #7)

  test_column_names_are_escaped: >-
    upstream's bad-char map enumerates adapters without a ClickHouse entry; backtick
    escaping is proven in spec/clickhouse/quoting_spec.rb

  test_primary_key_and_references_columns_should_be_identical_type: >-
    slice translation: fk columns are Nullable(Int64) while ids are Int64 (schema-slice
    rule: columns nullable by default)

  test_find_keeps_multiple_group_values: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)

  # Upstream topics.bonus_time is a TIME column; ClickHouse has no TIME type, and the
  # slice's DateTime64 stand-in does not cast bare clock strings like "5:42:00AM".
  test_attributes_on_dummy_time: &no_time_type >-
    ClickHouse has no TIME type; the slice's bonus_time is DateTime64, which does not
    cast bare clock strings
  test_utc_as_time_zone: *no_time_type

  test_respect_internal_encoding: >-
    column names arrive over the HTTP wire as UTF-8; Encoding.default_internal is not
    applied to schema strings

