ActiveRecord::Migration::ChangeSchemaTest:
  test_keeping_default_and_notnull_constraints_on_change: >-
    raw "UPDATE t SET ..." statement; ClickHouse 25.8 only mutates via ALTER TABLE ... UPDATE
  test_create_table_with_limits: &string_limit >-
    ClickHouse String has no length limit; limit: is accepted but not persisted
  test_column_exists_with_definition: *string_limit
  test_add_column_with_primary_key_attribute: >-
    the sorting key is fixed at CREATE TABLE; a primary-key column cannot be ALTERed in

ActiveRecord::Migration::ColumnsTest:
  test_removing_and_renaming_column_preserves_custom_primary_key: >-
    primary_keys returns [] by design (PLAN.md §5) — ClickHouse PRIMARY KEY is an index
    prefix, not identity; models declare their key client-side
  test_remove_column_with_multi_column_index: >-
    ClickHouse refuses to drop a column a skip index depends on, so remove_column
    drops the index too (MySQL keeps it on the remaining column)
  test_change_column_nullability: &non_nullable_default >-
    columns are non-Nullable by default (ClickHouse idiom); Rails expects nullable
  test_change_column_null_false: >-
    partial insert omits the column and ClickHouse fills the type default; no
    NOT NULL violation is possible for an unsent column

ActiveRecord::Migration::IndexTest:
  test_unique_index_exists: &no_unique_indexes >-
    ClickHouse has no unique indexes; unique: is accepted but unenforceable, so
    index_exists?(unique: true) honestly reports false

ActiveRecord::Migration::ReferencesStatementsTest:
  test_creates_named_unique_index: *no_unique_indexes

ActiveRecord::Migration::ReferencesIndexTest:
  test_creates_index_with_options: *no_unique_indexes

ActiveRecord::Migration::InvalidOptionsTest:
  # The exact option lists differ by design: column/table options gain ClickHouse
  # keys (codec:, engine:, order:, ...) and index options gain granularity:.
  test_add_column_with_invalid_options: &extended_option_list >-
    valid-keys message differs; ClickHouse extends the abstract option list
  test_add_reference_with_invalid_options: *extended_option_list
  test_create_table_with_invalid_options: *extended_option_list
  test_add_index_with_invalid_options: *extended_option_list

DefaultScopingTest:
  # ClickHouse has no transactions, so create! emits a lone INSERT. These tests read
  # capture_sql.second — the slot the INSERT lands in upstream, after BEGIN.
  test_combined_default_scope_without_and_with_all_queries_works: &insert_is_first_sql >-
    no transactions: capture_sql sees [INSERT], not [BEGIN, INSERT]; .second is nil
  test_default_scope_runs_on_create: *insert_is_first_sql
  test_default_scope_with_all_queries_runs_on_create: *insert_is_first_sql

NamedScopingTest:
  test_scopes_are_reset_on_association_reload: >-
    delete_all nullifies the FK on zero rows (destroy_all already ran); row stores
    skip the no-op, but ClickHouse type-checks the mutation expression itself and
    rejects NULL into non-Nullable post_id (CANNOT_CONVERT_TYPE, code 70)

RelationScopingTest:
  # Probed live on 25.8 and 26.6: both analyzers reject the base table reappearing
  # under an alias in a circular join (AMBIGUOUS_IDENTIFIER, code 207).
  test_circular_joins_with_scoping_does_not_crash: &circular_self_join >-
    self-join with unaliased base table raises AMBIGUOUS_IDENTIFIER
  test_circular_left_joins_with_scoping_does_not_crash: *circular_self_join

