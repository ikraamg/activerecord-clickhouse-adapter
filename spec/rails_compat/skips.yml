# Skip manifest for the vendored Rails Active Record suites.
# Every entry needs a one-line reason; this file may only shrink (ratchet).
# Format: { "TestClassName" => { "test_method_name" => "reason" } }
CalculationsTest:
  # ClickHouse has no functional-dependency GROUP BY: grouping by the primary key does
  # not license selecting other ungrouped columns (NOT_AN_AGGREGATE, code 215).
  test_should_count_with_group_by_qualified_name_on_loaded: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_having_with_strong_parameters: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_select_avg_with_joins_and_group_by_as_virtual_attribute_with_ar: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_select_avg_with_joins_and_group_by_as_virtual_attribute_with_sql: >-
    SELECT t.* GROUP BY t.id needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)
  test_ids_with_includes_and_non_primary_key_order: >-
    ORDER BY on a column outside GROUP BY needs functional-dependency GROUP BY (NOT_AN_AGGREGATE)

  # ClickHouse cannot resolve unaliased base-table columns in a self-join ON clause
  # (AMBIGUOUS_IDENTIFIER, code 207) for Rails' `FROM topics JOIN topics AS replies_topics`.
  test_pluck_with_qualified_name_on_loaded: >-
    self-join with unaliased base table raises AMBIGUOUS_IDENTIFIER

  # ClickHouse has no autoincrement or INSERT ... RETURNING: create! without an explicit
  # id stores the column default (0) and the record's id stays nil, so tests that read
  # back a server-assigned id cannot pass. Client-side id generation (snowflake/UUIDv7
  # via prefetch_primary_key?) is an open design question in PLAN.md.
  test_ids_on_relation: no autoincrement — create! without explicit id returns id nil
  test_pluck_in_relation: no autoincrement — create! without explicit id returns id nil
  test_pluck_with_serialization: no autoincrement — create! without explicit id returns id nil
  test_pluck_auto_table_name_prefix: no autoincrement — create! without explicit id returns id nil
  test_pluck_if_table_included: no autoincrement — create! without explicit id returns id nil
  test_pluck_not_auto_table_name_prefix_if_column_joined: >-
    no autoincrement — create! without explicit id returns id nil
  test_pluck_not_auto_table_name_prefix_if_column_included: >-
    no autoincrement — create! without explicit id returns id nil
  test_pluck_with_multiple_columns_and_includes: >-
    no autoincrement — create! without explicit id returns id nil
  test_pluck_joined_with_polymorphic_relation: >-
    no autoincrement — create! without explicit id returns id nil
  test_ids_with_polymorphic_relation_join: no autoincrement — create! without explicit id returns id nil
  test_calculation_with_polymorphic_relation: no autoincrement — create! without explicit id returns id nil
  test_grouped_calculation_with_polymorphic_relation: >-
    no autoincrement — create! without explicit id returns id nil
  test_should_calculate_against_given_relation: >-
    no autoincrement — create! without explicit id returns id nil
  test_sum_with_not_auto_table_name_prefix_if_column_included: >-
    no autoincrement — create! without explicit id returns id nil
  test_maximum_with_not_auto_table_name_prefix_if_column_included: >-
    no autoincrement — create! without explicit id returns id nil
  test_minimum_with_not_auto_table_name_prefix_if_column_included: >-
    no autoincrement — create! without explicit id returns id nil
